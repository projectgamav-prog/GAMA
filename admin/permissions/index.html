<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/core/styles/base.css">
    <link rel="stylesheet" href="/src/core/styles/theme.css">
    <link rel="stylesheet" href="/src/admin/admin.css">
    <title>Bhagavad Gita | Permissions</title>
</head>
<body class="permissions-page" data-nav-section="profile" data-footer-variant="profile">
    <div class="page-shell">
        <div data-shared-header></div>

        <main class="permissions-page-main">
            <section class="permissions-hero">
                <div>
                    <p class="permissions-eyebrow">Admin Access</p>
                    <h1 class="permissions-page-title">Permissions & Roles</h1>
                </div>
                <p class="permissions-lede">This page manages who can modify shared content while public and admin continue to use the same rendering system.</p>
                <div class="permissions-toolbar">
                    <button id="permissionsRefreshButton" type="button">Refresh Snapshot</button>
                </div>
                <p class="permissions-status is-muted" id="permissionsPageStatus">Loading permissions snapshot...</p>
            </section>

            <section class="permissions-overview" id="permissionsOverview" aria-label="Permissions overview"></section>

            <section class="permissions-grid">
                <section id="permissionsRolesPanel"></section>
                <section id="permissionsUsersPanel"></section>
            </section>
        </main>

        <div data-shared-footer></div>
    </div>

    <script src="/src/admin/context.js"></script>
    <script type="module" src="/src/core/browser/public-shell.js"></script>
    <script type="module" src="/src/admin/admin-controller.js"></script>
    <script type="module" src="/src/admin/permissions-page.js"></script>
</body>
</html>
