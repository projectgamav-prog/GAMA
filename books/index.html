<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/core/styles/base.css">
    <link rel="stylesheet" href="/src/core/styles/theme.css">
    <title>Bhagavad Gita | Books</title>
</head>
<body class="book-page" data-nav-section="education" data-education-item="books-all" data-footer-variant="books">
    <div class="page-shell book-shell">
        <div data-shared-header></div>

        <main class="book-page-main">
            <section class="book-hero">
                <span class="lotus-large" aria-hidden="true"></span>
                <h1>Book Library</h1>
                <p class="subtitle">Enter the major streams of teaching through book-level groupings and their essential themes.</p>
                <a class="btn btn-primary" href="#" data-route="chapters.index">Explore Chapters</a>
            </section>

            <section class="book-list-section">
                <h2 class="section-title">Books</h2>
                <p class="book-intro">Each book opens into its own teaching journey, with a quick insight panel to preview its central message before entering the chapters.</p>

                <div class="book-grid" id="bookGrid" role="list"></div>
            </section>
        </main>

        <div data-shared-footer></div>
    </div>
    <script type="module" src="/src/core/browser/public-shell.js"></script>
    <script type="module" src="/src/pages/books/books-page.js"></script>
</body>
</html>
